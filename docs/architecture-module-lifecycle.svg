<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580" font-family="monospace">
  <rect width="800" height="580" fill="#0f0f1e"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e2e2">Module Lifecycle &amp; Init Pattern</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#666">All module side-effects are gated by mount — absent modules run zero code</text>

  <!-- ── Consumer config ── -->
  <rect x="200" y="75" width="400" height="56" rx="8" fill="#16213e" stroke="#7ab8f5" stroke-width="1.5"/>
  <text x="400" y="98" text-anchor="middle" font-size="11" font-weight="700" fill="#7ab8f5">Consumer mounts Debugger</text>
  <text x="400" y="118" text-anchor="middle" font-size="11" fill="#aaa">&lt;Debugger modules={[logsModule, networkModule]} /&gt;</text>

  <line x1="400" y1="131" x2="400" y2="150" stroke="#4a4a6a" stroke-width="2" marker-end="url(#a)"/>

  <!-- ── Registry resolves modules ── -->
  <rect x="180" y="150" width="440" height="72" rx="8" fill="#16213e" stroke="#4caf7d" stroke-width="1.5"/>
  <text x="400" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf7d">DebuggerModuleRegistryProvider</text>
  <text x="400" y="190" text-anchor="middle" font-size="11" fill="#aaa">merges definitions + config  ·  sorts by order  ·  manages expand state</text>
  <text x="400" y="208" text-anchor="middle" font-size="10" fill="#666">emits route-change / viewport-change to all mounted modules</text>

  <line x1="400" y1="222" x2="400" y2="241" stroke="#4a4a6a" stroke-width="2" marker-end="url(#a)"/>

  <!-- ── ModuleStack renders accordion ── -->
  <rect x="200" y="241" width="400" height="56" rx="8" fill="#16213e" stroke="#4caf7d" stroke-width="1"/>
  <text x="400" y="264" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf7d">ModuleStack → AccordionItem per module</text>
  <text x="400" y="282" text-anchor="middle" font-size="10" fill="#888">wraps each render() in DebuggerModuleIdContext.Provider</text>

  <!-- split left / right -->
  <line x1="280" y1="297" x2="180" y2="330" stroke="#4a4a6a" stroke-width="2" marker-end="url(#a)"/>
  <line x1="520" y1="297" x2="620" y2="330" stroke="#4a4a6a" stroke-width="2" marker-end="url(#a)"/>

  <!-- ── logsModule panel ── -->
  <rect x="60" y="330" width="240" height="110" rx="8" fill="#1a1a2e" stroke="#e05c5c" stroke-width="1.5"/>
  <text x="180" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#e05c5c">LogsPanel mounts</text>
  <text x="180" y="370" text-anchor="middle" font-size="10" fill="#aaa">useEffect → initLogsStore()</text>
  <text x="180" y="386" text-anchor="middle" font-size="10" fill="#888">subscribe('route-change')</text>
  <text x="180" y="402" text-anchor="middle" font-size="10" fill="#888">→ pushEntry on nav</text>
  <text x="180" y="420" text-anchor="middle" font-size="10" fill="#666">reads logsStore (window.__debuggerLogs)</text>
  <text x="180" y="436" text-anchor="middle" font-size="10" fill="#666">re-renders via _subs forceUpdate</text>

  <!-- ── networkModule panel ── -->
  <rect x="500" y="330" width="240" height="110" rx="8" fill="#1a1a2e" stroke="#e05c5c" stroke-width="1.5"/>
  <text x="620" y="352" text-anchor="middle" font-size="11" font-weight="700" fill="#e05c5c">NetworkPanel mounts</text>
  <text x="620" y="370" text-anchor="middle" font-size="10" fill="#aaa">useEffect → initNetworkStore()</text>
  <text x="620" y="386" text-anchor="middle" font-size="10" fill="#888">fires fetch per endpoint</text>
  <text x="620" y="402" text-anchor="middle" font-size="10" fill="#888">loading → success / error</text>
  <text x="620" y="420" text-anchor="middle" font-size="10" fill="#666">reads networkStore (window.__debuggerNetwork)</text>
  <text x="620" y="436" text-anchor="middle" font-size="10" fill="#666">re-renders via _subs forceUpdate</text>

  <!-- unmount annotation -->
  <rect x="60" y="465" width="680" height="56" rx="8" fill="#16213e" stroke="#f59e42" stroke-width="1.5"/>
  <text x="400" y="487" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e42">Remove module — no Debugger changes needed</text>
  <text x="400" y="506" text-anchor="middle" font-size="11" fill="#aaa">&lt;Debugger modules={[logsModule]} /&gt;  →  NetworkPanel never mounts  →  zero network code runs</text>

  <!-- Store pattern note -->
  <rect x="270" y="330" width="220" height="110" rx="8" fill="#0f0f1e" stroke="#4a4a6a" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="354" text-anchor="middle" font-size="10" font-weight="700" fill="#888">Store Pattern</text>
  <text x="380" y="373" text-anchor="middle" font-size="10" fill="#666">window.__debuggerXxx</text>
  <text x="380" y="391" text-anchor="middle" font-size="10" fill="#666">lazy-init singleton</text>
  <text x="380" y="409" text-anchor="middle" font-size="10" fill="#666">_subs: Set&lt;() =&gt; void&gt;</text>
  <text x="380" y="427" text-anchor="middle" font-size="10" fill="#666">useReducer forceUpdate</text>
  <text x="380" y="445" text-anchor="middle" font-size="10" fill="#555">(not React state)</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a4a6a"/>
    </marker>
  </defs>

  <text x="400" y="558" text-anchor="middle" font-size="10" fill="#444">Init runs only while the panel is mounted — removing a module from the array silences it completely</text>
</svg>
