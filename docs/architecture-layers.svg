<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="800" height="560" font-family="monospace">
  <rect width="800" height="560" fill="#0f0f1e"/>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e2e2">System Layers</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#666">The Debugger is a host. Modules are guests. The host never knows the guest.</text>

  <!-- ── Layer 1: Consumer App ── -->
  <rect x="60" y="75" width="680" height="72" rx="8" fill="#16213e" stroke="#7ab8f5" stroke-width="1.5"/>
  <text x="400" y="97" text-anchor="middle" font-size="11" font-weight="700" fill="#7ab8f5" letter-spacing="1">CONSUMER APP</text>
  <text x="400" y="116" text-anchor="middle" font-size="11" fill="#aaa">config.debugger.js</text>
  <text x="400" y="134" text-anchor="middle" font-size="11" fill="#aaa">&lt;Debugger config={…} modules={[logsModule, networkModule, myModule]} /&gt;</text>

  <!-- arrow -->
  <line x1="400" y1="147" x2="400" y2="166" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 2: Config ── -->
  <rect x="160" y="166" width="480" height="72" rx="8" fill="#16213e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="1">CONFIG LAYER</text>
  <text x="400" y="207" text-anchor="middle" font-size="11" fill="#aaa">DebuggerConfigProvider  ·  mergeWithDefaults()</text>
  <text x="400" y="225" text-anchor="middle" font-size="11" fill="#aaa">useDebuggerConfig()  →  ResolvedDebuggerConfig (all fields required)</text>

  <!-- arrow -->
  <line x1="400" y1="238" x2="400" y2="257" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 3: Debugger Panel (host) ── -->
  <rect x="160" y="257" width="480" height="88" rx="8" fill="#16213e" stroke="#4caf7d" stroke-width="1.5"/>
  <text x="400" y="279" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf7d" letter-spacing="1">DEBUGGER PANEL — HOST</text>
  <text x="400" y="298" text-anchor="middle" font-size="11" fill="#aaa">DebuggerFab  →  DebuggerPanelRoot  →  ModuleStack</text>
  <text x="400" y="316" text-anchor="middle" font-size="11" fill="#aaa">DebuggerModuleRegistryProvider  (API broker)</text>
  <text x="400" y="334" text-anchor="middle" font-size="11" fill="#666">zero imports from any module</text>

  <!-- arrow -->
  <line x1="400" y1="345" x2="400" y2="364" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Layer 4: Module API ── -->
  <rect x="240" y="364" width="320" height="56" rx="8" fill="#1a1a2e" stroke="#f59e42" stroke-width="1.5"/>
  <text x="400" y="386" text-anchor="middle" font-size="11" font-weight="700" fill="#f59e42" letter-spacing="1">MODULE API — SINGLE CHANNEL</text>
  <text x="400" y="405" text-anchor="middle" font-size="11" fill="#aaa">useDebuggerApi()  ·  DebuggerModuleIdContext</text>

  <!-- arrows down to modules -->
  <line x1="220" y1="420" x2="150" y2="448" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="400" y1="420" x2="400" y2="448" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="580" y1="420" x2="650" y2="448" stroke="#4a4a6a" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ── Modules ── -->
  <rect x="60" y="448" width="180" height="68" rx="8" fill="#16213e" stroke="#e05c5c" stroke-width="1.5"/>
  <text x="150" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#e05c5c">logsModule</text>
  <text x="150" y="488" text-anchor="middle" font-size="10" fill="#888">LogsPanel</text>
  <text x="150" y="504" text-anchor="middle" font-size="10" fill="#666">logsStore (window)</text>

  <rect x="310" y="448" width="180" height="68" rx="8" fill="#16213e" stroke="#e05c5c" stroke-width="1.5"/>
  <text x="400" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#e05c5c">networkModule</text>
  <text x="400" y="488" text-anchor="middle" font-size="10" fill="#888">NetworkPanel</text>
  <text x="400" y="504" text-anchor="middle" font-size="10" fill="#666">networkStore (window)</text>

  <rect x="560" y="448" width="180" height="68" rx="8" fill="#16213e" stroke="#e05c5c" stroke-width="1.5"/>
  <text x="650" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#e05c5c">yourModule</text>
  <text x="650" y="488" text-anchor="middle" font-size="10" fill="#888">YourPanel</text>
  <text x="650" y="504" text-anchor="middle" font-size="10" fill="#666">useDebuggerApi()</text>

  <!-- arrowhead marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a4a6a"/>
    </marker>
  </defs>

  <!-- Legend -->
  <text x="400" y="540" text-anchor="middle" font-size="10" fill="#444">Arrows show direction of dependency — modules depend on the host; the host never depends on modules</text>
</svg>
