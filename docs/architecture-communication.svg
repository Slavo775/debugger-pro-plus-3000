<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520" font-family="monospace">
  <rect width="800" height="520" fill="#0f0f1e"/>

  <text x="400" y="36" text-anchor="middle" font-size="17" font-weight="700" fill="#e2e2e2">Communication — Single Channel</text>
  <text x="400" y="55" text-anchor="middle" font-size="11" fill="#666">useDebuggerApi() is the only way a module talks to the Debugger</text>

  <!-- ── Consumer App box ── -->
  <rect x="60" y="80" width="200" height="64" rx="8" fill="#16213e" stroke="#7ab8f5" stroke-width="1.5"/>
  <text x="160" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#7ab8f5">CONSUMER APP</text>
  <text x="160" y="122" text-anchor="middle" font-size="10" fill="#888">onModuleEvent callback</text>
  <text x="160" y="138" text-anchor="middle" font-size="10" fill="#888">useDebuggerLog(id)</text>

  <!-- ── Registry / API broker ── -->
  <rect x="300" y="68" width="200" height="88" rx="8" fill="#16213e" stroke="#4caf7d" stroke-width="2"/>
  <text x="400" y="94" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf7d">MODULE REGISTRY</text>
  <text x="400" y="112" text-anchor="middle" font-size="10" fill="#888">DebuggerModuleRegistry-</text>
  <text x="400" y="128" text-anchor="middle" font-size="10" fill="#888">Provider</text>
  <text x="400" y="146" text-anchor="middle" font-size="10" fill="#666">API broker · event router</text>

  <!-- ── Module box ── -->
  <rect x="540" y="80" width="200" height="64" rx="8" fill="#16213e" stroke="#e05c5c" stroke-width="1.5"/>
  <text x="640" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="#e05c5c">MODULE</text>
  <text x="640" y="122" text-anchor="middle" font-size="10" fill="#888">useDebuggerApi()</text>
  <text x="640" y="138" text-anchor="middle" font-size="10" fill="#888">inside render()</text>

  <!-- emit: module → registry → consumer -->
  <line x1="540" y1="104" x2="500" y2="104" stroke="#f59e42" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrO)"/>
  <line x1="300" y1="104" x2="260" y2="104" stroke="#f59e42" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrO)"/>
  <text x="420" y="97" text-anchor="middle" font-size="10" fill="#f59e42">emit(event, payload)</text>
  <text x="180" y="77" text-anchor="middle" font-size="10" fill="#f59e42">onModuleEvent()</text>
  <line x1="180" y1="80" x2="200" y2="104" stroke="#f59e42" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- subscribe: system events → module -->
  <line x1="500" y1="128" x2="540" y2="128" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrP)"/>
  <text x="420" y="145" text-anchor="middle" font-size="10" fill="#a78bfa">subscribe(event, handler)</text>
  <text x="420" y="158" text-anchor="middle" font-size="9" fill="#666">route-change · viewport-change</text>

  <!-- updateData -->
  <line x1="540" y1="142" x2="502" y2="152" stroke="#4caf7d" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrG)"/>
  <text x="530" y="170" text-anchor="middle" font-size="10" fill="#4caf7d">updateData(patch)</text>

  <!-- ── System Events box ── -->
  <rect x="300" y="220" width="200" height="80" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="400" y="244" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">SYSTEM EVENTS</text>
  <text x="400" y="263" text-anchor="middle" font-size="10" fill="#888">history.pushState/replaceState</text>
  <text x="400" y="280" text-anchor="middle" font-size="10" fill="#888">popstate → route-change</text>
  <text x="400" y="296" text-anchor="middle" font-size="10" fill="#888">resize / orientation → viewport-change</text>
  <line x1="400" y1="156" x2="400" y2="220" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrP)"/>

  <!-- ── Debug Snapshot box ── -->
  <rect x="60" y="348" width="200" height="68" rx="8" fill="#1a1a2e" stroke="#4caf7d" stroke-width="1.5"/>
  <text x="160" y="370" text-anchor="middle" font-size="11" font-weight="700" fill="#4caf7d">DEBUG SNAPSHOT</text>
  <text x="160" y="389" text-anchor="middle" font-size="10" fill="#888">_getDebugSnapshot()</text>
  <text x="160" y="407" text-anchor="middle" font-size="10" fill="#666">{ moduleId: { ...data } }</text>
  <line x1="300" y1="148" x2="200" y2="360" stroke="#4caf7d" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrG)"/>

  <!-- ── Config box ── -->
  <rect x="540" y="220" width="200" height="68" rx="8" fill="#1a1a2e" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="640" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">CONFIG</text>
  <text x="640" y="261" text-anchor="middle" font-size="10" fill="#888">useDebuggerConfig()</text>
  <text x="640" y="279" text-anchor="middle" font-size="10" fill="#666">read-only · separate from API</text>
  <line x1="640" y1="144" x2="640" y2="220" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrP)"/>

  <!-- Legend -->
  <text x="400" y="360" text-anchor="middle" font-size="13" font-weight="700" fill="#666">Legend</text>
  <line x1="215" y1="382" x2="255" y2="382" stroke="#f59e42" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="260" y="386" font-size="10" fill="#f59e42">emit  (module → outside)</text>
  <line x1="215" y1="402" x2="255" y2="402" stroke="#a78bfa" stroke-width="2"/>
  <text x="260" y="406" font-size="10" fill="#a78bfa">subscribe  (Debugger → module)</text>
  <line x1="215" y1="422" x2="255" y2="422" stroke="#4caf7d" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="260" y="426" font-size="10" fill="#4caf7d">updateData / snapshot  (module → registry)</text>

  <!-- arrowhead markers -->
  <defs>
    <marker id="arrO" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e42"/>
    </marker>
    <marker id="arrP" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrG" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4caf7d"/>
    </marker>
  </defs>

  <text x="400" y="500" text-anchor="middle" font-size="10" fill="#444">Modules call useDebuggerApi() — scoped automatically via DebuggerModuleIdContext</text>
</svg>
